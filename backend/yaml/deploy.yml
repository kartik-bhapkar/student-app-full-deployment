apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-01

spec:
  replicas: 2
  selector:
    matchExpressions:
      - {key: app, operator: In, values: [nginx]}
  
  template:
    metadata:
      name: pod-01
      labels:
        app: nginx
  
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "500Mi"
              cpu: "500m"
